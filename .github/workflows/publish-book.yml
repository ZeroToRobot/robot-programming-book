name: Publish mdBook to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout book source
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -L https://github.com/rust-lang/mdBook/releases/download/v0.4.52/mdbook-v0.4.52-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv mdbook /usr/local/bin/mdbook
          mdbook --version

      - name: Build book
        run: mdbook build

      - name: Add .nojekyll
        run: touch book/.nojekyll

      - name: Publish to doshidev.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_PAT }}
          external_repository: doshidev/doshidev.github.io/robot-programming-book
          publish_branch: master
          publish_dir: ./book
          destination_dir: robot-programming-book
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
